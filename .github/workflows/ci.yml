name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate example loops
        run: |
          python -m cairn.main validate cairnlang/examples/hello-world.crn
          python -m cairn.main validate cairnlang/examples/branching-review.crn
          python -m cairn.main validate cairnlang/examples/data-pipeline.crn

      - name: Run tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q
